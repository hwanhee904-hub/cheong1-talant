<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>청1 방학숙제</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{--bg1:#241436;--bg2:#160c24;--surf:rgba(255,255,255,.06);--surf2:rgba(255,255,255,.1);--gold:#FFC94D;--gold2:#F4B740;--coral:#FF6B6B;--mint:#4DD0B1;--ink:#FBF6EF;--mute:#B9A8C9;--line:rgba(255,255,255,.12);}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(120% 80% at 80% -10%,#3a1f5c 0%,var(--bg1) 40%,var(--bg2) 100%);color:var(--ink);font-family:'Noto Sans KR',sans-serif;padding:16px;}
#app{max-width:760px;margin:0 auto;}
.brand-name,.me-talents,.panel-title,.rk-val,.coin{font-family:'Black Han Sans',sans-serif;font-weight:400;}
.coin{display:inline-grid;place-items:center;border-radius:50%;background:linear-gradient(145deg,#FFE08A,var(--gold2));color:#5a3d00;box-shadow:0 2px 0 #b9831f,0 4px 10px rgba(0,0,0,.35);flex:none;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-name{font-size:24px;margin:0;color:var(--gold);text-shadow:0 2px 0 rgba(0,0,0,.3);}
.link-btn{background:var(--surf);border:1px solid var(--line);color:var(--mute);font-family:inherit;font-weight:700;font-size:13px;padding:8px 13px;border-radius:10px;cursor:pointer;}
.link-btn.admin{color:var(--gold);}
.seg{display:flex;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px;}
.seg button{flex:1;font-family:inherit;font-weight:700;font-size:13px;color:var(--mute);background:none;border:none;padding:9px;border-radius:9px;cursor:pointer;}
.seg button.on{background:linear-gradient(145deg,var(--gold),var(--gold2));color:#3a2600;}
.tabs{display:flex;gap:6px;background:var(--surf);padding:5px;border-radius:13px;border:1px solid var(--line);margin-bottom:16px;overflow-x:auto;}
.tabs button{flex:1;white-space:nowrap;font-family:inherit;font-weight:700;font-size:14px;color:var(--mute);background:none;border:none;padding:9px 12px;border-radius:9px;cursor:pointer;}
.tabs button.on{background:linear-gradient(145deg,var(--gold),var(--gold2));color:#3a2600;}
.me-card{position:relative;background:var(--surf);border:1px solid var(--line);border-left:5px solid var(--c);border-radius:20px;padding:18px 20px;margin-bottom:16px;}
.me-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.me-name{font-size:18px;font-weight:700;}
.me-team{font-size:13px;color:var(--mute);}
.me-talents{font-size:44px;line-height:1;color:var(--gold);display:flex;align-items:baseline;gap:7px;margin:8px 0;}
.unit{font-family:'Noto Sans KR';font-size:14px;color:var(--mute);font-weight:500;}
.me-stats{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--mute);}
.me-stats b{color:var(--ink);}
.rank-list{display:flex;flex-direction:column;gap:8px;}
.rank-card{display:flex;align-items:center;gap:10px;background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:11px 14px;}
.rank-card.mine{border-color:var(--c);box-shadow:0 0 0 1px var(--c);}
.rk{width:26px;text-align:center;font-weight:700;font-size:15px;}
.dot{width:11px;height:11px;border-radius:50%;flex:none;}
.rk-name{font-weight:700;min-width:80px;}
.rk-name em{font-weight:400;font-size:12px;font-style:normal;margin-left:5px;color:var(--mute);}
.rk-bar{flex:1;height:8px;border-radius:99px;background:rgba(0,0,0,.25);overflow:hidden;min-width:30px;}
.rk-bar span{display:block;height:100%;border-radius:99px;}
.rk-val{font-size:18px;color:var(--gold);min-width:54px;text-align:right;}
.panel{background:var(--surf);border:1px solid var(--line);border-radius:20px;padding:20px;}
.narrow-panel{max-width:460px;margin:0 auto;}
.panel-title{font-size:22px;color:var(--gold);margin:0 0 14px;}
.sub{font-size:14px;margin:22px 0 10px;border-top:1px solid var(--line);padding-top:16px;}
.field-label{display:block;font-size:12px;color:var(--mute);margin:14px 0 7px;font-weight:700;}
.hint{font-size:13px;color:var(--mute);margin:0 0 12px;}
.center{text-align:center;}.small{font-size:12px;}
.input,select.input,textarea.input{font-family:inherit;font-size:15px;background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px 13px;width:100%;outline:none;}
.input:focus{border-color:var(--gold);}
.input.narrow{max-width:120px;}
.row{display:flex;gap:9px;align-items:center;}
.row.wrap{flex-wrap:wrap;}
.btn{font-family:'Noto Sans KR';font-weight:700;font-size:14px;border:none;border-radius:11px;padding:11px 17px;cursor:pointer;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.full{width:100%;}
.btn-primary{background:linear-gradient(145deg,var(--gold),var(--gold2));color:#3a2600;}
.btn-buy{background:linear-gradient(145deg,#FF8A8A,var(--coral));color:#3a0000;width:100%;margin-top:8px;}
.btn-ghost{background:var(--surf2);color:var(--ink);}
.btn-ghost.danger{background:rgba(255,107,107,.15);color:var(--coral);}
.btn-buy.danger{color:#fff;}
.team-pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{font-family:inherit;font-size:14px;font-weight:700;background:var(--surf2);border:2px solid transparent;color:var(--ink);padding:9px 13px;border-radius:11px;cursor:pointer;}
.pill em{font-style:normal;color:var(--gold);margin-left:5px;font-size:12px;}
.pill.on{border-color:var(--c);background:rgba(255,255,255,.14);}
.quick-row{display:flex;gap:8px;flex-wrap:wrap;}
.quick{font-family:'Black Han Sans';font-size:18px;background:var(--surf2);border:1px solid var(--line);color:var(--gold);width:62px;height:48px;border-radius:12px;cursor:pointer;}
.quick:disabled{opacity:.4;cursor:not-allowed;}
.picker-list{margin-top:8px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.picker-item{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 13px;cursor:pointer;font-family:inherit;font-size:14px;text-align:left;}
.picker-item .grow{flex:1;font-weight:700;}
.picker-item .grow em{font-weight:400;font-style:normal;margin-left:6px;color:var(--mute);}
.picker-item.on{border-color:var(--gold);background:rgba(255,201,77,.12);}
.balance{margin:12px 0;color:var(--mute);font-size:14px;}.balance b{color:var(--gold);font-size:17px;}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px;}
.item-card{position:relative;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:15px;padding:13px;text-align:center;}
.item-card.out{opacity:.5;}
.item-del{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--mute);font-size:18px;cursor:pointer;line-height:1;}
.item-emoji{font-size:32px;}.item-name{font-weight:700;margin:5px 0 3px;}
.item-price{color:var(--gold);font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;}
.item-stock{font-size:12px;color:var(--mute);margin:3px 0;}
.mini-feed{margin-top:16px;border-top:1px solid var(--line);padding-top:12px;}
.mini-row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0;align-items:center;}
.mini-row .grow1{font-weight:500;white-space:nowrap;}
.mini-row .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mini-row .earn{color:var(--mint);font-weight:700;}.mini-row .spend{color:var(--coral);font-weight:700;}
.muted{color:var(--mute);}
.list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.list-row,.member-row{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.2);border-radius:10px;padding:9px 12px;}
.list-row .grow{flex:1;font-weight:500;}
.member-row .m-info{flex:1;display:flex;flex-direction:column;}
.m-name{font-weight:700;}.m-name em{font-weight:400;font-style:normal;margin-left:6px;color:var(--mute);}
.mini-select{background:rgba(0,0,0,.3);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-family:inherit;font-size:13px;max-width:110px;}
.x{background:none;border:none;color:var(--coral);font-size:13px;font-weight:700;cursor:pointer;}
.danger-title{color:var(--coral);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--surf2);border:1px solid var(--line);border-radius:99px;padding:5px 11px;font-size:13px;font-weight:700;color:var(--gold);}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:#FF6B6B;color:#fff;font-size:10px;font-weight:800;border-radius:99px;min-width:16px;height:16px;padding:0 4px;margin-left:5px;vertical-align:middle;line-height:1;}
.member-row.done{opacity:.55;}
.member-row.done .m-name{text-decoration:line-through;}
.member-row .btn{padding:8px 13px;font-size:13px;}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;margin-left:8px;white-space:nowrap;}
.badge.ok{background:rgba(77,208,177,.18);color:var(--mint);}
.badge.wait{background:rgba(255,159,69,.18);color:#FFB04D;}
.empty{text-align:center;padding:50px 20px;color:var(--mute);}.empty p{margin-bottom:16px;font-size:16px;}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);padding:13px 22px;border-radius:13px;font-weight:700;font-size:15px;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:50;}
.toast.good{background:linear-gradient(145deg,#6FE3C6,var(--mint));color:#04342a;}
.toast.buy{background:linear-gradient(145deg,#FF9A9A,var(--coral));color:#3a0000;}
.toast.bad{background:#3a1a1a;color:#FFB4B4;border:1px solid var(--coral);}
.loading{text-align:center;padding:60px 20px;color:var(--mute);}
input:focus-visible,button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
.emoji-btn{font-size:30px;width:58px;height:58px;display:grid;place-items:center;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:11px;cursor:pointer;}
.emoji-btn:hover{border-color:var(--gold);}
.emoji-picker{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;padding:10px;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:12px;}
.emoji-opt{font-size:22px;width:38px;height:38px;display:grid;place-items:center;border-radius:8px;cursor:pointer;background:none;border:1px solid transparent;}
.emoji-opt:hover{background:rgba(255,255,255,.1);}
.emoji-opt.on{border-color:var(--gold);background:rgba(255,201,77,.15);}
@media (max-width:560px){.brand-name{font-size:21px;}.me-talents{font-size:38px;}.rk-name{min-width:60px;}}
</style>
</head>
<body>
<div id="app"><div class="loading">불러오는 중…</div></div>

<script>
// ===== state =====
var S = null, me = null;
var myId = null;
try { myId = localStorage.getItem('c1_myId'); } catch(e) {}
var mode = 'participant';
var pview = 'home';
var aview = 'earn';
var boardSeg = 'team';
var authTab = 'login';
var adminPin = null;
var typing = false;

var EMOJI_LIST=['🎁','🏆','🎫','🎉','🎯','🌟','💝','🏅','🎪','🎠','🍕','🍦','🍰','🍩','🍫','🍔','🍜','🍣','🧃','🍿','🎮','📚','🎵','🎨','🎸','🎲','🎭','🧸','☕','🛍️'];

var f = {
  loginName:'', loginPin:'',
  regName:'', regSoon:'', regPhone:'', regTeam:'', regPin:'',
  earnQ:'', earnSel:'', earnAmt:'', earnLabel:'', setVal:'',
  giveSel:'', giveAmt:'',
  buyQ:'', buySel:'',
  memQ:'',
  genN:'', genSuf:'팀', teamNames:'',
  iEmoji:'', iName:'', iPrice:'', iStock:'', iEmojiPicker:false,
  pickerTeam:'', memTeam:'', earnLogMore:0,
  distFilter:'undone', distQ:'',
  setTitle:'', setPin:''
};

document.addEventListener('focusin', function(e){ if(e.target.matches('input,textarea,select')) typing=true; });
document.addEventListener('focusout', function(){ typing=false; });

// ===== server bridge (fetch 방식) =====
function call(fn){
  var args = Array.prototype.slice.call(arguments, 1);
  return fetch('/api/action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fn: fn, args: args })
  }).then(function(r){ return r.json(); }).then(function(result){
    if(result.error) throw new Error(result.error);
    return result.data;
  });
}

// ===== helpers =====
function fmt(n){ return (Number(n)||0).toLocaleString('ko-KR'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function teamTotal(tid){ var t=0; for(var i=0;i<S.members.length;i++) if(S.members[i].teamId===tid) t+=S.members[i].talents||0; return t; }
function teamColor(tid){ for(var i=0;i<S.teams.length;i++) if(S.teams[i].id===tid) return S.teams[i].color; return '#888'; }
function teamNameOf(tid){ for(var i=0;i<S.teams.length;i++) if(S.teams[i].id===tid) return S.teams[i].name; return '미배정'; }
function memberById(id){ for(var i=0;i<S.members.length;i++) if(S.members[i].id===id) return S.members[i]; return null; }
function toast(msg, kind){
  var d=document.createElement('div'); d.className='toast '+(kind||'good'); d.textContent=msg;
  document.body.appendChild(d); setTimeout(function(){ d.remove(); }, 2200);
}
function recomputeMe(){ me = myId ? memberById(myId) : null; if(myId && S && !me){ myId=null; try{localStorage.removeItem('c1_myId');}catch(e){} } }

// ===== load + poll =====
function refresh(initial){
  return call('getState').then(function(s){
    S=s; S.teams.sort(function(a,b){ return a.name.localeCompare(b.name,'ko'); }); recomputeMe();
    if(initial || !typing) render();
  }).catch(function(e){ if(initial) document.getElementById('app').innerHTML='<div class="loading">연결 오류: '+esc(e.message||e)+'<br>새로고침 해주세요.</div>'; });
}
refresh(true);
setInterval(function(){
  if(typing) return;
  if(mode==='admin' && adminPin){ refresh(false); loadPurchases(); return; }
  refresh(false);
  if(mode==='participant' && me && pview==='market'){ loadMyPurchases(); }
}, 7000);

// ===== render =====
function render(){
  if(!S){ return; }
  var html = topbar();
  if(mode==='admin'){ html += adminPin ? adminView() : pinView(); }
  else if(!me){ html += authView(); }
  else { html += participantView(); }
  document.getElementById('app').innerHTML = html;
}

function topbar(){
  var right = '';
  if(mode==='participant'){
    if(me) right += '<button class="link-btn" onclick="logout()">로그아웃</button>';
    right += '<button class="link-btn admin" onclick="goAdmin()">관리자</button>';
  } else {
    right += '<button class="link-btn" onclick="goParticipant()">← 참가자 화면</button>';
  }
  return '<div class="topbar"><div class="brand"><span class="coin" style="width:32px;height:32px;font-size:16px">D</span>'
    + '<h1 class="brand-name">'+esc(S.title)+'</h1></div><div class="row">'+right+'</div></div>';
}

// ---------- participant: auth ----------
function authView(){
  var h = '<div class="panel narrow-panel"><div class="seg">'
    + '<button class="'+(authTab==='login'?'on':'')+'" onclick="setAuthTab(\'login\')">로그인</button>'
    + '<button class="'+(authTab==='register'?'on':'')+'" onclick="setAuthTab(\'register\')">처음이에요 (가입)</button></div>';
  if(authTab==='login'){
    h += '<p class="hint">이름과 PIN을 입력하면 바로 로그인돼요.</p>'
      + '<label class="field-label">이름</label>'
      + '<input class="input" placeholder="이름" value="'+esc(f.loginName)+'" oninput="f.loginName=this.value" onkeydown="if(event.key===\'Enter\')document.getElementById(\'loginPinInput\').focus()">'
      + '<label class="field-label">개인 PIN</label>'
      + '<input class="input" id="loginPinInput" type="password" inputmode="numeric" placeholder="PIN" value="'+esc(f.loginPin)+'" oninput="f.loginPin=this.value" onkeydown="if(event.key===\'Enter\')doLogin()">'
      + '<button class="btn btn-primary full" style="margin-top:14px" onclick="doLogin()">로그인</button>';
  } else if(!S.open){
    h += '<p class="muted center">현재 가입이 닫혀 있어요. 리더에게 문의해 주세요.</p>';
  } else if(S.teams.length===0){
    h += '<p class="muted center">아직 팀이 준비되지 않았어요. 잠시만요.</p>';
  } else {
    h += '<label class="field-label">이름</label><input class="input" value="'+esc(f.regName)+'" oninput="f.regName=this.value" placeholder="이름">'
      + '<label class="field-label">전화번호</label><input class="input" value="'+esc(f.regPhone)+'" oninput="f.regPhone=this.value" placeholder="010-0000-0000" inputmode="tel">'
      + '<label class="field-label">개인 PIN <span class="muted small">(4자리 이상, 로그인 시 사용)</span></label>'
      + '<input class="input" type="password" inputmode="numeric" value="'+esc(f.regPin)+'" oninput="f.regPin=this.value" placeholder="숫자 PIN 설정">'
      + '<label class="field-label">팀 선택</label><div class="team-pills">';
    for(var i=0;i<S.teams.length;i++){ var t=S.teams[i];
      h += '<button class="pill '+(f.regTeam===t.id?'on':'')+'" style="--c:'+t.color+'" onclick="f.regTeam=\''+t.id+'\';render()">'+esc(t.name)+'</button>';
    }
    h += '</div><button class="btn btn-primary full" style="margin-top:18px" onclick="doRegister()">가입하고 시작하기</button>';
  }
  h += '</div>';
  return h;
}
function setAuthTab(t){ authTab=t; render(); }
function doLogin(){
  var name=f.loginName.trim(), pin=f.loginPin.trim();
  if(!name){ toast('이름을 입력해 주세요.','bad'); return; }
  if(!pin){ toast('PIN을 입력해 주세요.','bad'); return; }
  call('loginByNamePin', name, pin).then(function(m){
    myId=m.id; try{localStorage.setItem('c1_myId',m.id);}catch(e){}
    f.loginName=''; f.loginPin=''; recomputeMe(); pview='home'; render();
    toast('로그인됐어요!');
  }).catch(function(e){ toast(e.message||e,'bad'); });
}
function logout(){ myId=null; me=null; window.__myPurchases=null; try{localStorage.removeItem('c1_myId');}catch(e){} render(); }
function doRegister(){
  if(!f.regName.trim()||!f.regTeam){ toast('이름과 팀을 확인해 주세요.','bad'); return; }
  if(!f.regPin.trim()||f.regPin.trim().length<4){ toast('PIN을 4자리 이상 입력해 주세요.','bad'); return; }
  call('register', f.regName, f.regSoon, f.regPhone, f.regTeam, f.regPin).then(function(m){
    myId=m.id; try{localStorage.setItem('c1_myId',m.id);}catch(e){}
    f.regName=f.regSoon=f.regPhone=f.regTeam=f.regPin='';
    return refresh(true);
  }).then(function(){ toast('가입 완료!'); }).catch(function(e){ toast(e.message||e,'bad'); });
}

// ---------- participant: home ----------
function participantView(){
  var c=teamColor(me.teamId);
  var teamsRanked=S.teams.map(function(t){return {id:t.id,name:t.name,color:t.color,total:teamTotal(t.id)};}).sort(function(a,b){return b.total-a.total;});
  var myTeamRank=1; for(var i=0;i<teamsRanked.length;i++){ if(teamsRanked[i].id===me.teamId){ myTeamRank=i+1; break; } }
  var membersRanked=S.members.slice().sort(function(a,b){return b.talents-a.talents;});
  var myRank=1; for(var j=0;j<membersRanked.length;j++){ if(membersRanked[j].id===me.id){ myRank=j+1; break; } }
  var h='<div class="me-card" style="--c:'+c+'"><div class="me-top"><span class="dot" style="background:'+c+'"></span>'
    + '<span class="me-name">'+esc(me.name)+'</span><span class="me-team">'+esc(teamNameOf(me.teamId))+(me.soon?' · '+esc(me.soon):'')+'</span></div>'
    + '<div class="me-talents">'+fmt(me.talents)+'<span class="unit">달란트</span></div>'
    + '<div class="me-stats"><span>내 순위 <b>'+myRank+'위</b> / '+S.members.length+'명</span>'
    + '<span>우리 팀 <b>'+myTeamRank+'위</b> · '+fmt(teamTotal(me.teamId))+'달란트</span></div></div>';
  h+='<div class="tabs">'
    + '<button class="'+(pview==='home'?'on':'')+'" onclick="setPview(\'home\')">순위</button>'
    + '<button class="'+(pview==='give'?'on':'')+'" onclick="setPview(\'give\')">팀원에게 주기</button>'

  } else {
    var memTeamObj=S.teams.filter(function(t){return t.id===f.memTeam;})[0];
    var leaderName=memTeamObj?memTeamObj.name.replace(/\s*순\s*$/,''):'';
    var teamMembers=S.members.filter(function(m){return m.teamId===f.memTeam;})
      .sort(function(a,b){
        var aL=a.name===leaderName?0:1, bL=b.name===leaderName?0:1;
        if(aL!==bL) return aL-bL;
        return a.name.localeCompare(b.name,'ko');
      });
    for(var mi=0;mi<teamMembers.length;mi++) h+=memberRow(teamMembers[mi],phones);
    if(teamMembers.length===0) h+='<p class="muted center">이 순에 참가자가 없습니다.</p>';
  }
  return h+'</div></div>';
}
function memberRow(m,phones){
  var opts='<option value="">미배정</option>';
  for(var j=0;j<S.teams.length;j++){ var t=S.teams[j]; opts+='<option value="'+t.id+'" '+(m.teamId===t.id?'selected':'')+'>'+esc(t.name)+'</option>'; }
  var myTeam=S.teams.filter(function(t){return t.id===m.teamId;})[0];
  var isLeader=myTeam && myTeam.name.replace(/\s*순\s*$/, '')===m.name;
  var crown=isLeader?'<span style="font-size:12px;vertical-align:super;margin-left:2px">👑</span>':'';
  return '<div class="member-row"><span class="dot" style="background:'+teamColor(m.teamId)+'"></span>'
    +'<div class="m-info"><span class="m-name">'+esc(m.name)+crown+' <em>'+esc(m.soon)+'</em></span>'
    +'<span class="muted small">'+esc((phones||{})[m.id]||'번호: 미표시')+' · '+fmt(m.talents)+' 달란트</span></div>'
    +'<select class="mini-select" onchange="setMemTeam(\''+m.id+'\',this.value)">'+opts+'</select>'
    +'<button class="x" style="color:var(--mute);margin-right:2px" onclick="adminResetPin(\''+m.id+'\',\''+esc(m.name)+'\')">PIN</button>'
    +'<button class="x" onclick="delMember(\''+m.id+'\',\''+esc(m.name)+'\')">삭제</button></div>';
}
function loadPhones(){
  call('getAdminData', adminPin).then(function(d){
    var ph={}; for(var i=0;i<d.members.length;i++) ph[d.members[i].id]=d.members[i].phone||'번호 미입력';
    window.__phones=ph; render(); toast('전화번호를 불러왔어요.');
  }).catch(function(e){ toast(e.message||e,'bad'); });
}
function setMemTeam(id,tid){ call('setMemberTeam', adminPin, id, tid).then(function(){ return refresh(true); }).catch(function(e){toast(e.message||e,'bad');}); }
function delMember(id,name){ if(!confirm(name+' 님을 삭제할까요?')) return; call('removeMember', adminPin, id).then(function(){ return refresh(true); }).then(function(){toast('삭제했어요.');}).catch(function(e){toast(e.message||e,'bad');}); }
function adminResetPin(id,name){
  var np=prompt(name+' 님의 PIN을 새로 설정해 주세요 (4자리 이상):');
  if(!np||np.trim().length<4){ if(np!==null) toast('4자리 이상 입력해 주세요.','bad'); return; }
  call('resetMemberPin', adminPin, id, np.trim()).then(function(){ toast(name+' PIN 재설정 완료!'); }).catch(function(e){ toast(e.message||e,'bad'); });
}

function adminTeams(){
  var h='<div class="panel"><h2 class="panel-title">팀 · '+S.teams.length+'팀</h2>'
    + '<label class="field-label">번호로 한 번에 만들기</label><div class="row">'
    + '<input class="input narrow" type="number" min="1" max="20" value="'+esc(f.genN)+'" oninput="f.genN=this.value" placeholder="개수 (예:19)">'
    + '<input class="input narrow" value="'+esc(f.genSuf)+'" oninput="f.genSuf=this.value" placeholder="단위">'
    + '<button class="btn btn-primary" onclick="genTeams()">생성</button></div>'
    + '<label class="field-label">이름으로 추가 (쉼표로 여러 개)</label><div class="row">'
    + '<input class="input" value="'+esc(f.teamNames)+'" oninput="f.teamNames=this.value" placeholder="사자팀, 어린양팀">'
    + '<button class="btn btn-ghost" onclick="addTeamsByName()">추가</button></div><div class="list">';
  for(var i=0;i<S.teams.length;i++){ var t=S.teams[i];
    var cnt=S.members.filter(function(m){return m.teamId===t.id;}).length;
    h+='<div class="list-row"><span class="dot" style="background:'+t.color+'"></span><span class="grow">'+esc(t.name)+'</span>'
      +'<span class="muted">'+cnt+'명 · '+fmt(teamTotal(t.id))+'달란트</span>'
      +'<button class="x" onclick="delTeam(\''+t.id+'\',\''+esc(t.name)+'\')">삭제</button></div>';
  }
  if(S.teams.length===0) h+='<p class="muted">팀이 없습니다.</p>';
  return h+'</div></div>';
}
function genTeams(){
  var n=Math.min(20, Math.round(Number(f.genN))); if(!(n>0)){ toast('개수를 확인해 주세요.','bad'); return; }
  var suf=f.genSuf.trim()||'팀'; var names=[]; for(var i=1;i<=n;i++) names.push(i+suf);
  call('addTeams', adminPin, names).then(function(){ f.genN=''; return refresh(true); }).then(function(){toast(n+'개 팀 생성!');}).catch(function(e){toast(e.message||e,'bad');});
}
function addTeamsByName(){
  var names=f.teamNames.split(/[,\n]/).map(function(s){return s.trim();}).filter(Boolean);
  if(names.length===0) return;
  call('addTeams', adminPin, names).then(function(){ f.teamNames=''; return refresh(true); }).then(function(){toast('추가했어요.');}).catch(function(e){toast(e.message||e,'bad');});
}
function delTeam(id,name){ if(!confirm(name+' 팀을 삭제할까요? (소속 인원은 미배정 처리)')) return; call('removeTeam', adminPin, id).then(function(){ return refresh(true); }).catch(function(e){toast(e.message||e,'bad');}); }

function adminMarket(){
  var m=memberById(f.buySel);
  var backBtn=f.pickerTeam?'<button class="btn btn-ghost" style="font-size:13px;padding:7px 12px" onclick="f.pickerTeam=\'\';render()">뒤로가기</button>':'';
  var h='<div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 class="panel-title" style="margin:0">달란트 시장 (구매 처리)</h2>'+backBtn+'</div><label class="field-label">구매할 참가자</label>'
    + '<input class="input" placeholder="이름/순 검색" value="'+esc(f.buyQ)+'" oninput="f.buyQ=this.value;fillList(\'buyList\',f.buyQ,f.buySel,\'pickBuy\')">'
    + memberPickerHtml('buyList', f.buyQ, f.buySel, 'pickBuy');
  if(m) h+='<div class="balance">'+esc(m.name)+' · 보유 <b>'+fmt(m.talents)+'</b></div>';
  h+='<div class="market-grid" style="margin-top:10px">';
  for(var i=0;i<S.items.length;i++){ var it=S.items[i]; var ok=m&&m.talents>=it.price&&it.stock>0;
    h+='<div class="item-card '+(it.stock<=0?'out':'')+'"><button class="item-del" onclick="delItem(\''+it.id+'\')">×</button>'
      +'<div class="item-emoji">'+esc(it.emoji)+'</div><div class="item-name">'+esc(it.name)+'</div>'
      +'<div class="item-price"><span class="coin" style="width:16px;height:16px;font-size:8px">D</span> '+fmt(it.price)+'</div>'
      +'<div class="item-stock">'+(it.stock>0?'남은 수량 '+it.stock:'품절')+'</div>'
      +'<button class="btn btn-buy" '+(ok?'':'disabled')+' onclick="doBuy(\''+it.id+'\')">'+(it.stock<=0?'품절':(!m?'참가자 선택':(ok?'구매':'부족')))+'</button></div>';
  }
  if(S.items.length===0) h+='<p class="muted">상품을 추가해 주세요.</p>';
  var epHtml='';
  if(f.iEmojiPicker){
    epHtml='<div class="emoji-picker">';
    for(var ei=0;ei<EMOJI_LIST.length;ei++){
      epHtml+='<button class="emoji-opt'+(f.iEmoji===EMOJI_LIST[ei]?' on':'')+'" onclick="pickEmoji('+ei+')">'+EMOJI_LIST[ei]+'</button>';
    }
    epHtml+='</div>';
  }
    h+='</div><h3 class="sub">상품 추가</h3>'
    + '<div style="margin-bottom:8px"><button class="emoji-btn" onclick="f.iEmojiPicker=!f.iEmojiPicker;render()" title="아이콘 선택">'+(f.iEmoji||'🎁')+'</button>'
    + '<span class="muted small" style="margin-left:10px">아이콘 클릭해서 선택</span></div>'
    + epHtml
    + '<div class="row wrap" style="margin-top:10px">'
    + '<input class="input" value="'+esc(f.iName)+'" oninput="f.iName=this.value" placeholder="상품 이름">'
    + '<input class="input narrow" type="number" value="'+esc(f.iPrice)+'" oninput="f.iPrice=this.value" placeholder="가격">'
    + '<input class="input narrow" type="number" value="'+esc(f.iStock)+'" oninput="f.iStock=this.value" placeholder="수량">'
    + '<button class="btn btn-primary" onclick="addItemGo()">추가</button></div></div>';
  return h;
}
function pickBuy(id){ f.buySel=id; render(); }
function doBuy(itemId){
  if(!f.buySel){ toast('참가자를 먼저 선택해 주세요.','bad'); return; }
  call('buy', adminPin, f.buySel, itemId).then(function(){ return refresh(true); }).then(function(){toast('구매 완료!','buy');}).catch(function(e){toast(e.message||e,'bad');});
}
function pickEmoji(i){ f.iEmoji=EMOJI_LIST[i]; f.iEmojiPicker=false; render(); }
function addItemGo(){
  if(!f.iName.trim()||!f.iPrice||!f.iStock){ toast('상품 정보를 확인해 주세요.','bad'); return; }
  call('addItem', adminPin, f.iName, f.iPrice, f.iStock, f.iEmoji).then(function(){ f.iName=f.iPrice=f.iStock=f.iEmoji=''; f.iEmojiPicker=false; return refresh(true); }).then(function(){toast('상품 추가!');}).catch(function(e){toast(e.message||e,'bad');});
}
function delItem(id){ call('removeItem', adminPin, id).then(function(){ return refresh(true); }).catch(function(e){toast(e.message||e,'bad');}); }

function adminDistribute(){
  var arr=window.__purchases;
  var h='<div class="panel"><h2 class="panel-title">배부 (구매 내역)</h2>'
    + '<button class="btn btn-ghost" onclick="loadPurchases()">새로고침</button>';
  if(!arr){ return h+'<p class="muted center" style="margin-top:16px">불러오는 중…</p></div>'; }
  var undone=arr.filter(function(p){return !p.done;});
  var byItem={}; for(var i=0;i<undone.length;i++){ byItem[undone[i].item]=(byItem[undone[i].item]||0)+1; }
  var sum=''; for(var k in byItem){ sum+='<span class="chip">'+esc(k)+' × '+byItem[k]+'</span>'; }
  h+='<div class="chips" style="margin:12px 0">'+(sum||'<span class="muted">배부할 항목이 없어요.</span>')+'</div>';
  h+='<div class="seg">'
    + '<button class="'+(f.distFilter==='undone'?'on':'')+'" onclick="f.distFilter=\'undone\';render()">미배부 ('+undone.length+')</button>'
    + '<button class="'+(f.distFilter==='done'?'on':'')+'" onclick="f.distFilter=\'done\';render()">완료 ('+(arr.length-undone.length)+')</button>'
    + '<button class="'+(f.distFilter==='all'?'on':'')+'" onclick="f.distFilter=\'all\';render()">전체 ('+arr.length+')</button></div>';
  h+='<input class="input" placeholder="이름/상품 검색" value="'+esc(f.distQ)+'" oninput="f.distQ=this.value;render()">';
  var q=f.distQ.trim();
  var list=arr.filter(function(p){
    if(f.distFilter==='undone'&&p.done) return false;
    if(f.distFilter==='done'&&!p.done) return false;
    if(q && p.name.indexOf(q)<0 && p.item.indexOf(q)<0) return false;
    return true;
  });
  h+='<div class="list" style="margin-top:12px">';
  for(var j=0;j<list.length;j++){ var p=list[j];
    h+='<div class="member-row'+(p.done?' done':'')+'"><div class="m-info"><span class="m-name">'+esc(p.item)+'</span>'
      +'<span class="muted small">'+esc(p.name)+' · '+esc(p.team)+' · '+fmt(p.price)+'D</span></div>'
      +'<button class="btn '+(p.done?'btn-ghost':'btn-primary')+'" onclick="toggleDone(\''+p.id+'\','+(p.done?'false':'true')+')">'+(p.done?'배부취소':'배부완료')+'</button></div>';
  }
  if(list.length===0) h+='<p class="muted center">해당 내역이 없어요.</p>';
  return h+'</div></div>';
}
function loadPurchases(){
  if(!adminPin) return;
  call('getPurchases', adminPin).then(function(arr){ window.__purchases=arr; if(!typing) render(); }).catch(function(e){ toast(e.message||e,'bad'); });
}
function toggleDone(id, done){
  if(window.__purchases){ for(var i=0;i<window.__purchases.length;i++) if(window.__purchases[i].id===id) window.__purchases[i].done=done; }
  render();
  call('markPurchaseDone', adminPin, id, done).catch(function(e){ toast(e.message||e,'bad'); loadPurchases(); });
}
function adminSettings(){
  if(f.setTitle==='') f.setTitle=S.title;
  return '<div class="panel"><h2 class="panel-title">설정</h2>'
    + '<label class="field-label">행사 제목</label><input class="input" value="'+esc(f.setTitle)+'" oninput="f.setTitle=this.value">'
    + '<label class="field-label">새 관리자 PIN (바꿀 때만 입력)</label><div class="row">'
    + '<input class="input narrow" value="'+esc(f.setPin)+'" oninput="f.setPin=this.value" placeholder="새 PIN">'
    + '<button class="btn btn-ghost" onclick="saveMeta()">저장</button></div>'
    + '<h3 class="sub">회원가입</h3><div class="row"><span class="muted">현재: '+(S.open?'열림':'닫힘')+'</span>'
    + '<button class="btn btn-ghost" onclick="toggleOpen()">'+(S.open?'가입 닫기':'가입 열기')+'</button></div>'
    + '<h3 class="sub danger-title">초기화</h3>'
    + '<button class="btn btn-ghost danger" onclick="doReset()">모든 데이터 초기화</button>'
    + '<p class="hint" style="margin-top:14px">데이터는 Vercel KV에 저장됩니다.</p></div>';
}
function saveMeta(){
  call('setMeta', adminPin, {title:f.setTitle, newPin:f.setPin}).then(function(){
    if(f.setPin.trim()) adminPin=f.setPin.trim();
    f.setPin=''; return refresh(true);
  }).then(function(){toast('저장했어요.');}).catch(function(e){toast(e.message||e,'bad');});
}
function toggleOpen(){ call('setMeta', adminPin, {open:!S.open}).then(function(){ return refresh(true); }).catch(function(e){toast(e.message||e,'bad');}); }
function doReset(){
  if(!confirm('정말 모든 데이터를 초기화할까요? (멤버·팀·달란트·상품 삭제)')) return;
  call('resetAll', adminPin).then(function(){ window.__phones={}; window.__purchases=null; return refresh(true); }).then(function(){toast('초기화 완료.');}).catch(function(e){toast(e.message||e,'bad');});
}
</script>
</body>
</html>
